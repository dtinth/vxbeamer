name: Reusable Desktop Build

on:
  workflow_call:
    inputs:
      upload-artifacts:
        type: boolean
        required: false
        default: true
      release-tag:
        type: string
        required: false
        default: ""

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact-name: desktop-linux
            artifact-path: |
              apps/desktop/src-tauri/target/release/bundle/deb/*.deb
              apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          - platform: macos-latest
            artifact-name: desktop-macos
            artifact-path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - platform: windows-latest
            artifact-name: desktop-windows
            artifact-path: |
              apps/desktop/src-tauri/target/release/bundle/msi/*.msi
              apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain via mise
        uses: jdx/mise-action@v4

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"

      - name: Install Node.js dependencies
        run: vp install

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - name: Build desktop app
        run: vp run desktop#build

      - name: Upload workflow artifacts
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

      - name: Stage release assets
        if: inputs.release-tag != ''
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  publish-release-assets:
    if: inputs.release-tag != ''
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download desktop bundles
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-desktop-*
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release-tag }}
          files: release-assets/*
          fail_on_unmatched_files: true
