name: Build Desktop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact-name: desktop-linux
            artifact-path: |
              apps/desktop/src-tauri/target/release/bundle/deb/*.deb
              apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          - platform: macos-latest
            artifact-name: desktop-macos
            artifact-path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - platform: windows-latest
            artifact-name: desktop-windows
            artifact-path: |
              apps/desktop/src-tauri/target/release/bundle/msi/*.msi
              apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"

      - name: Install Node.js dependencies
        run: vp install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - name: Build desktop app
        run: vp run desktop#build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
