name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Version tag for a manually published Docker image
        required: true
        type: string
      latest:
        description: Also push the latest image tag during manual publishing
        required: false
        default: true
        type: boolean

jobs:
  build-and-push:
    uses: ./.github/workflows/reusable-docker.yml
    permissions:
      contents: read
      packages: write
    with:
      version: ${{ github.event_name == 'push' && 'main' || inputs.version }}
      latest: ${{ github.event_name == 'workflow_dispatch' && inputs.latest || false }}
