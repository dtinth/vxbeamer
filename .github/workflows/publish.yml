# Any manual changes to this file may be overwritten.

name: Publish
on:
  push:
    branches:
      - main
concurrency: ${{ github.workflow }}-${{ github.ref }}
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      release-tag: ${{ steps.release-metadata.outputs.tag }}
      release-version: ${{ steps.release-metadata.outputs.version }}
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - name: Configure Git user
        run: |
          git config --global user.name dtinth-bot
          git config --global user.email dtinth-bot@users.noreply.github.com
      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          setupGitUser: false
          publish: vp exec changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Capture published release metadata
        if: steps.changesets.outputs.published == 'true'
        id: release-metadata
        uses: actions/github-script@v8
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        with:
          script: |
            const packages = JSON.parse(process.env.PUBLISHED_PACKAGES || "[]")
            const releasePackage = packages.find((pkg) => pkg.name === "vxasr")
            if (!releasePackage) {
              core.setFailed(
                `Expected vxasr to be published, received: ${packages.map((pkg) => pkg.name).join(", ") || "(none)"}`,
              )
              return
            }

            const { name, version } = releasePackage
            core.setOutput("tag", `${name}@${version}`)
            core.setOutput("version", version)

  publish-docker:
    name: Publish Docker image
    needs: release
    if: needs.release.outputs.published == 'true'
    uses: ./.github/workflows/reusable-docker.yml
    permissions:
      contents: read
      packages: write
    with:
      version: ${{ needs.release.outputs.release-version }}
      latest: true

  publish-desktop:
    name: Publish desktop bundles
    needs: release
    if: needs.release.outputs.published == 'true'
    uses: ./.github/workflows/reusable-desktop.yml
    permissions:
      contents: write
    with:
      upload-artifacts: false
      release-tag: ${{ needs.release.outputs.release-tag }}
