name: Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version tag for the published Docker image
        required: true
        type: string
      latest:
        description: Also push the latest image tag
        required: false
        default: true
        type: boolean

jobs:
  build-and-push:
    uses: ./.github/workflows/reusable-docker.yml
    permissions:
      contents: read
      packages: write
    with:
      version: ${{ inputs.version }}
      latest: ${{ inputs.latest }}
