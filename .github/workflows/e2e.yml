name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"

      - run: vp install

      - uses: dtinth/setup-playwright-test-docker@main

      - name: Build vxasr
        run: vp run vxasr#build

      - name: Run Playwright tests
        run: vp exec playwright test --reporter=github
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Publish storyboard
        run: npx 'github:dtinth/publish-storyboard#main' --input=test-storyboards || true
